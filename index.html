<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AspiVault | Password Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <header>
            <div class="logo">
                <i class="fa fa-shield"></i>
                <h1>AspiVault</h1>
            </div>
            <p>Local Storage Password Manager</p>
        </header>

        <section class="form-container">
            <h2 id="form-title">Add New Credential</h2>
            <form id="password-form">
                <input type="hidden" id="entry-id">
                
                <div class="input-group">
                    <label>Website / Application</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-link"></i>
                        <input type="text" id="website" placeholder="e.g. Google, Netflix" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Username / Phone</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" placeholder="e.g. +91 98765 43210" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter or Generate" required>
                        
                        <div class="password-tools">
                            <i class="fa-solid fa-shuffle" id="generate-btn" title="Generate Random Password"></i>
                            <i class="fa-solid fa-eye" id="toggle-form-password" title="Show/Hide"></i>
                        </div>
                    </div>
                    <div class="strength-container">
                        <div id="strength-bar" class="strength-bar"></div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="cancel-btn" class="btn btn-secondary hidden">Cancel</button>
                    <button type="submit" id="save-btn" class="btn btn-primary">
                        <i class="fa-solid fa-floppy-disk"></i> Save
                    </button>
                </div>
            </form>
        </section>

        <div class="search-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search...">
            </div>
        </div>

        <section id="credentials-list" class="grid-container">
            </section>

        <div id="empty-state" class="hidden">
            <i class="fa-solid fa-shield-cat"></i>
            <p>Your vault is empty.</p>
        </div>

    </div>

    <div id="toast" class="toast">Notification</div>

    <script src="index.js"></script>
</body>
</html>
